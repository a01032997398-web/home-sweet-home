function getAlbum(f){for(const a of ALBUMS)if(a.keys.some(k=>f.includes(k)))return a;return null;}
function getTag(f){
  const fl=f.toLowerCase();
  if(["크루즈","독일","필리핀","보홀","태국","캄보디아","인도","대만","스페인","유럽","크로아티아","베니스","카파도키아","퓌센","몬트리올","뉴욕","보스턴","잔시"].some(k=>fl.includes(k)))return{label:"해외여행",color:"#4a8c6f"};
  if(["속초","평창","정동진","거제","통영","안면도","진도","광주","홍천","제주","서귀포","애월","경안","천진암","이태원"].some(k=>fl.includes(k)))return{label:"국내여행",color:"#4a6f8c"};
  if(["결혼","생축","송년","졸업","추모","장모","아들","민지","구순","공연","연극"].some(k=>fl.includes(k)))return{label:"가족행사",color:"#8c4a6f"};
  if(["트레킹","소노캄","흔들","설중","산책"].some(k=>fl.includes(k)))return{label:"트레킹",color:"#8c6f4a"};
  return{label:"기타",color:"#5a5652"};
}
let shown=60;
function renderTL(){
  const list=document.getElementById("tlList");
  list.innerHTML="";
  let curY=null;
  EVENTS.slice(0,shown).forEach(e=>{
    if(e.year!==curY){curY=e.year;const d=document.createElement("div");d.className="tl-year";d.textContent=curY+"년";list.appendChild(d);}
    const tag=getTag(e.folder);const alb=getAlbum(e.folder);
    const item=document.createElement("div");item.className="tl-item";
    item.innerHTML=`<div class="tl-dot" style="background:${tag.color};"></div><div class="tl-date">${e.display}</div><div class="tl-body"><div class="tl-title">${e.folder}${e.v>0?`<span class="video-badge">동영상 ${e.v}</span>`:""}<br>${alb?`<a class="tl-link" href="${alb.url}" target="_blank">사진 보기 →</a>`:""}</div><div class="tl-meta">${tag.label} · 사진 ${e.p}장${e.v?` · 동영상 ${e.v}개`:""}</div></div>`;
    list.appendChild(item);
  });
  if(EVENTS.length>shown){const m=document.createElement("div");m.className="load-more";m.textContent=`+ ${EVENTS.length-shown}개 더 보기`;m.onclick=()=>{shown+=60;renderTL();};list.appendChild(m);}
}
function renderAlb(){
  const grid=document.getElementById("albGrid");grid.innerHTML="";
  ALBUMS.forEach(a=>{const card=document.createElement("div");card.className="album-card";
    card.innerHTML=`<div class="album-thumb" style="background:${a.color}20;"><div style="width:28px;height:28px;border-radius:6px;background:${a.color};opacity:0.7;"></div></div><div class="album-name">${a.title}</div><div class="album-meta">${a.date} · ${a.cnt}</div><a class="album-btn" href="${a.url}" target="_blank">Photos 보기 →</a>`;
    grid.appendChild(card);});
}
function renderYr(){
  const yCnt={};EVENTS.forEach(e=>{yCnt[e.year]=(yCnt[e.year]||0)+e.p+e.v;});
  const sorted=Object.entries(yCnt).sort((a,b)=>b[0]-a[0]);
  const max=Math.max(...sorted.map(s=>s[1]));
  const el=document.getElementById("yrBars");el.innerHTML="";
  sorted.forEach(([y,cnt])=>{const pct=Math.round(cnt/max*100);
    el.innerHTML+=`<div class="year-row"><span class="year-label">${y}</span><div class="year-bar-bg"><div class="year-bar-fill" style="width:${pct}%;background:hsl(${180+pct},45%,42%);"></div></div><span class="year-count">${cnt.toLocaleString()}</span></div>`;
  });
}
function show(id,btn){document.querySelectorAll(".sec").forEach(s=>s.classList.remove("on"));document.querySelectorAll(".nav button").forEach(b=>b.classList.remove("on"));document.getElementById(id).classList.add("on");btn.classList.add("on");}
renderTL();renderAlb();renderYr();
</script>
